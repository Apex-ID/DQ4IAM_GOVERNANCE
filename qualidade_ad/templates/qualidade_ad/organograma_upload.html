{% extends 'base.html' %}
{% block content %}
<div class="card">
    <div class="card-header bg-primary text-white">Upload de Organograma</div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Analisar Arquivo</button>
            <a href="{% url 'listar_organograma' %}" class="btn btn-secondary">Voltar</a>
        </form>
    </div>
</div>
{% endblock %}
