{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - APEX GOVERNANCE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%); /* Azul Corporativo */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        /* Estilo do Logo */
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-img {
            /* --- ALTERAÇÃO AQUI: Reduzido de 180px para 100px --- */
            max-width: 100px; 
            /* ---------------------------------------------------- */
            height: auto;
            display: block;
            margin: 0 auto; /* Centraliza a imagem */
        }
        
        .app-title {
            font-size: 24px;
            font-weight: bold;
            color: #001f3f;
            margin-top: 15px; /* Aumentei um pouco a margem superior */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #001f3f;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #001f3f;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #003366;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="{% static 'img/logo_apex.png' %}" alt="Logo APEX Governance" class="logo-img">
            <div class="app-title">APEX GOVERNANCE</div>
        </div>

        <div class="subtitle">Acesso Restrito ao Painel de Auditoria</div>

        {% if form.errors %}
            <div class="error-message">
                Usuário ou senha incorretos.<br>Por favor, tente novamente.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Usuário</label>
                <input type="text" name="username" autofocus required id="id_username" placeholder="Digite seu usuário">
            </div>

            <div class="form-group">
                <label for="id_password">Senha</label>
                <input type="password" name="password" required id="id_password" placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn-login">ENTRAR</button>
        </form>

        <div class="footer">
            &copy; 2025 Universidade Federal de Sergipe.<br>Departamento de Computação.
        </div>
    </div>

</body>
</html>
